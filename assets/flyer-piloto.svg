<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Fondo degradado profundo -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#101b3a"/>
      <stop offset="1" stop-color="#1a1140"/>
    </linearGradient>
    <!-- Acento verde WhatsApp -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25D366"/>
      <stop offset="1" stop-color="#12b886"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ddc84"/>
      <stop offset="1" stop-color="#22c1c3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#25D366" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#25D366" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="170" cy="240" r="420" fill="url(#glow)"/>
  <circle cx="950" cy="1500" r="480" fill="url(#glow)" opacity="0.7"/>

  <!-- Patrón sutil de puntos -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="900" r="4"/>
    <circle cx="200" cy="980" r="4"/>
    <circle cx="160" cy="1060" r="4"/>
    <circle cx="940" cy="640" r="4"/>
    <circle cx="980" cy="720" r="4"/>
    <circle cx="900" cy="700" r="4"/>
  </g>

  <!-- Badge superior -->
  <g transform="translate(540,150)" text-anchor="middle">
    <rect x="-230" y="-44" width="460" height="74" rx="37" fill="#ffffff" opacity="0.08"/>
    <rect x="-230" y="-44" width="460" height="74" rx="37" fill="none" stroke="url(#accent2)" stroke-width="2"/>
    <circle cx="-178" cy="-7" r="9" fill="#25D366"/>
    <text x="14" y="4" font-family="Montserrat" font-weight="700" font-size="30" fill="#eafff4" letter-spacing="3">PROGRAMA PILOTO 2026</text>
  </g>

  <!-- Titular -->
  <g text-anchor="middle" font-family="Montserrat">
    <text x="540" y="380" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-1">Tu negocio con</text>
    <text x="540" y="490" font-weight="900" font-size="118" fill="url(#accent)" letter-spacing="-2">recepcionista</text>
    <text x="540" y="588" font-weight="800" font-size="70" fill="#ffffff">que nunca duerme</text>
  </g>

  <!-- Subtítulo -->
  <g text-anchor="middle" font-family="Inter">
    <text x="540" y="678" font-weight="500" font-size="40" fill="#b9c4e0">Una IA que atiende tu</text>
    <text x="540" y="732" font-weight="700" font-size="40" fill="#eafff4">WhatsApp 24/7, sea cual sea tu giro</text>
  </g>

  <!-- Tarjeta de chat / mockup -->
  <g filter="url(#cardShadow)">
    <rect x="190" y="800" width="700" height="560" rx="44" fill="#0d152b"/>
    <rect x="190" y="800" width="700" height="560" rx="44" fill="none" stroke="#25D366" stroke-width="2" opacity="0.4"/>
    <!-- header del chat -->
    <rect x="190" y="800" width="700" height="92" rx="44" fill="#142446"/>
    <rect x="190" y="846" width="700" height="46" fill="#142446"/>
    <circle cx="258" cy="846" r="30" fill="url(#accent)"/>
    <text x="258" y="857" text-anchor="middle" font-family="Montserrat" font-weight="800" font-size="30" fill="#06281a">IA</text>
    <text x="312" y="838" font-family="Inter" font-weight="700" font-size="32" fill="#ffffff">Intake · Recepción</text>
    <text x="312" y="876" font-family="Inter" font-weight="500" font-size="24" fill="#25D366">● en línea</text>

    <!-- burbuja cliente -->
    <g font-family="Inter">
      <rect x="240" y="930" width="430" height="74" rx="24" fill="#1d2b4d"/>
      <text x="270" y="965" font-size="27" fill="#dfe6f7">Hola, ¿tienen disponibilidad</text>
      <text x="270" y="996" font-size="27" fill="#dfe6f7">para esta semana?</text>
    </g>
    <!-- burbuja IA -->
    <g font-family="Inter">
      <rect x="410" y="1024" width="430" height="110" rx="24" fill="#15402c"/>
      <text x="440" y="1059" font-size="27" fill="#eafff4">¡Claro! Cuéntame qué necesitas</text>
      <text x="440" y="1092" font-size="27" fill="#eafff4">y tomo tus datos. Aviso al</text>
      <text x="440" y="1125" font-size="27" fill="#eafff4">equipo enseguida. ✅</text>
    </g>
    <!-- burbuja cliente 2 -->
    <g font-family="Inter">
      <rect x="300" y="1154" width="370" height="64" rx="24" fill="#1d2b4d"/>
      <text x="330" y="1193" font-size="27" fill="#dfe6f7">Va, ahorita te paso 🙌</text>
    </g>
    <!-- estado -->
    <text x="540" y="1305" text-anchor="middle" font-family="Inter" font-weight="600" font-size="26" fill="#7e8bb0">Atiende · capta datos · agenda · notifica al dueño</text>
  </g>

  <!-- Bullets de beneficios -->
  <g font-family="Inter" font-weight="600" font-size="34" fill="#e7ecfa">
    <g transform="translate(170,1450)">
      <circle cx="20" cy="-12" r="20" fill="url(#accent)"/>
      <path d="M11 -12 l6 7 l12 -14" fill="none" stroke="#06281a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="0">Responde al instante, sin perder clientes</text>
    </g>
    <g transform="translate(170,1520)">
      <circle cx="20" cy="-12" r="20" fill="url(#accent)"/>
      <path d="M11 -12 l6 7 l12 -14" fill="none" stroke="#06281a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="0">Entiende fotos y audios del cliente</text>
    </g>
    <g transform="translate(170,1590)">
      <circle cx="20" cy="-12" r="20" fill="url(#accent)"/>
      <path d="M11 -12 l6 7 l12 -14" fill="none" stroke="#06281a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="0">Panel web para ver todas tus conversaciones</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(540,1740)" text-anchor="middle">
    <rect x="-380" y="-58" width="760" height="116" rx="58" fill="url(#accent)" filter="url(#cardShadow)"/>
    <text x="0" y="14" font-family="Montserrat" font-weight="800" font-size="46" fill="#06281a" letter-spacing="1">QUIERO ENTRAR AL PILOTO</text>
  </g>

  <!-- Footer -->
  <g text-anchor="middle" font-family="Inter">
    <text x="540" y="1858" font-weight="700" font-size="34" fill="#ffffff">Cupos limitados · Desliza arriba ⬆</text>
    <text x="540" y="1900" font-weight="500" font-size="28" fill="#8e9ac0">Intake · Recepcionista IA para tu negocio</text>
  </g>
</svg>

name: Deploy production

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: SHA de imagen ya probado en staging
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment 'production' con required reviewers → gate de aprobación manual.
    environment: production
    permissions: { contents: read, packages: write }
    steps:
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - name: Promover la MISMA imagen (re-tag a :prod, sin reconstruir)
        run: |
          for svc in api worker; do
            src=ghcr.io/${{ github.repository_owner }}/intake-$svc:${{ github.event.inputs.image_sha }}
            docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/intake-$svc:prod "$src"
          done
      - name: Deploy via SSH (pull → migrate → up → smoke /health)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/intake
            docker compose pull
            docker compose run --rm api npx prisma migrate deploy
            docker compose up -d
            curl -fsS https://api.${{ secrets.DOMAIN }}/health

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTA: NO existe api/package.json — el `npm test` raíz cubre tests/** Y api/tests/**
  # vía vitest.config.ts. PROHIBIDO `cd api && npm test`.
  test-root:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: intake
          POSTGRES_USER: intake
          POSTGRES_PASSWORD: intake
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U intake -d intake"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://intake:intake@localhost:5432/intake
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test

  test-spa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: spa/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build worker image (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Deploy staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/intake-api:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/intake-api:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/intake-worker:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/intake-worker:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH (pull → migrate → up → smoke /health)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/intake
            docker compose pull
            # Migraciones ANTES de levantar api/worker.
            docker compose run --rm api npx prisma migrate deploy
            docker compose up -d
            curl -fsS https://api-staging.${{ secrets.DOMAIN }}/health

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: intake
      POSTGRES_USER: intake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intake -d intake"]
      interval: 5s
      timeout: 5s
      retries: 10
    # sin `ports:` — solo accesible en la red interna de Docker

  # Worker multi-tenant (TenantManager): mantiene N conexiones Baileys en un solo
  # proceso/shard. Agregar un tenant NO toca este archivo: se da de alta en la BD
  # (Tenant + TenantSettings) y el manager lo levanta. Escalar = subir réplicas
  # con su SHARD_ID/SHARD_COUNT.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://intake:${POSTGRES_PASSWORD}@postgres:5432/intake
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      INTERNAL_PORT: 3002
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      SHARD_ID: 0
      SHARD_COUNT: 1
    volumes:
      # Sesiones y media particionadas por tenantId DENTRO del volumen.
      - baileys-sessions:/app/data/baileys-session
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # sin `ports:` — la API lo alcanza por nombre de servicio en la red interna

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://intake:${POSTGRES_PASSWORD}@postgres:5432/intake
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      # URL interna del TenantManager (shard único). Con N shards: TENANT_MANAGER_URL_0, _1, …
      TENANT_MANAGER_URL: http://worker:3002
      SHARD_COUNT: 1
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PORT: 3001
      # Billing (Fase 3) — Stripe. Secretas solo en backend, nunca en la SPA ni en logs.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      SPA_URL: ${CORS_ORIGIN}
      BILLING_GRACE_DAYS: ${BILLING_GRACE_DAYS:-3}
      BILLING_EXEMPT_TENANT_IDS: ${BILLING_EXEMPT_TENANT_IDS:-}
    ports: ["3001:3001"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  baileys-sessions:
  media:
